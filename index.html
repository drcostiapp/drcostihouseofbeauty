<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Costi House of Beauty</title>
    <meta name="description" content="Dr. Costi House of Beauty — Relax the mind, Renew the body, Revive the soul. Coming soon.">
    <link rel="icon" type="image/png" href="logo-full.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D1B17C;
            --gold-dark: #847132;
            --gold-light: #E2CBA0;
            --navy: #1E2A37;
            --navy-deep: #141E28;
            --cream: #D8CCB8;
        }

        html { font-size: 16px; }

        body {
            font-family: 'Raleway', sans-serif;
            background: var(--navy-deep);
            color: #fff;
            overflow-x: hidden;
            cursor: default;
        }

        /* ── Preloader ── */
        .preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--navy-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .preloader.done {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .preloader img {
            width: 80px;
            opacity: 0;
            animation: preloaderReveal 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes preloaderReveal {
            0%   { opacity: 0; transform: scale(0.8); filter: brightness(0); }
            50%  { opacity: 1; transform: scale(1); filter: brightness(1.3); }
            100% { opacity: 1; transform: scale(1); filter: brightness(1); }
        }

        /* ── Cursor glow ── */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(209,177,124,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }

        body:hover .cursor-glow { opacity: 1; }

        /* ── Background texture ── */
        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px;
        }

        .bg-vignette {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at center, transparent 40%, var(--navy-deep) 100%);
        }

        /* ── Gold accent lines ── */
        .line-top, .line-bottom {
            position: fixed;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, rgba(209,177,124,0.15) 50%, transparent 95%);
            z-index: 50;
        }
        .line-top { top: 0; }
        .line-bottom { bottom: 0; }

        /* ── Page wrapper ── */
        .page {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            opacity: 0;
            transition: opacity 1s 0.3s ease;
        }

        .page.visible { opacity: 1; }

        /* ── Monogram hero ── */
        .monogram-wrap {
            position: relative;
            margin-bottom: 48px;
        }

        .monogram-wrap img {
            width: clamp(140px, 22vw, 220px);
            height: auto;
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(12px);
            animation: heroReveal 1.4s 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .monogram-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(209,177,124,0.08) 0%, transparent 60%);
            z-index: 1;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes heroReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Brand text ── */
        .brand-name {
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            animation: heroReveal 1.2s 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            margin-bottom: 16px;
        }

        .brand-name h1 {
            font-family: 'Raleway', sans-serif;
            font-weight: 200;
            font-size: clamp(0.7rem, 1.6vw, 0.9rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ── Tagline ── */
        .tagline {
            text-align: center;
            opacity: 0;
            animation: heroReveal 1.2s 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            margin-bottom: 56px;
        }

        .tagline p {
            font-weight: 200;
            font-size: clamp(0.65rem, 1.2vw, 0.78rem);
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.5;
        }

        /* ── Coming Soon ── */
        .coming-soon {
            text-align: center;
            opacity: 0;
            animation: heroReveal 1.2s 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            margin-bottom: 60px;
        }

        .coming-soon h2 {
            font-weight: 200;
            font-size: clamp(1.6rem, 4vw, 3rem);
            letter-spacing: 14px;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            display: inline-block;
        }

        .coming-soon h2::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--gold);
        }

        /* ── Consultation CTA ── */
        .cta {
            text-align: center;
            opacity: 0;
            animation: heroReveal 1s 1.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            margin-bottom: 80px;
        }

        .cta a {
            display: inline-block;
            padding: 18px 52px;
            border: 1px solid rgba(209,177,124,0.3);
            color: var(--gold);
            text-decoration: none;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .cta a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
        }

        .cta a:hover {
            color: var(--navy-deep);
            border-color: var(--gold);
        }

        .cta a:hover::before {
            opacity: 1;
        }

        /* ── Footer ── */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 28px 96px 28px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: heroReveal 1s 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 10;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .footer-left a,
        .footer-left span {
            font-size: 0.62rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(216,204,184,0.35);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-left a:hover {
            color: var(--gold);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .footer-right a {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .footer-right a:hover {
            opacity: 1;
        }

        .footer-right a svg {
            width: 15px;
            height: 15px;
            fill: var(--gold);
        }

        /* ── Floating WhatsApp ── */
        .wa-float {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 52px;
            height: 52px;
            background: rgba(209,177,124,0.12);
            border: 1px solid rgba(209,177,124,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .wa-float:hover {
            background: var(--gold);
            border-color: var(--gold);
        }

        .wa-float svg {
            width: 22px;
            height: 22px;
            fill: var(--gold);
            transition: fill 0.4s ease;
        }

        .wa-float:hover svg {
            fill: var(--navy-deep);
        }

        /* ── Responsive ── */
        @media (max-width: 680px) {
            .footer {
                flex-direction: column;
                gap: 20px;
                padding: 20px 24px 88px;
                position: relative;
            }

            .footer-left {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }

            .footer-right {
                gap: 24px;
                margin-bottom: 8px;
            }

            .cta a {
                padding: 16px 36px;
                letter-spacing: 4px;
            }

            .coming-soon h2 {
                letter-spacing: 8px;
            }
        }

        /* ── Selection color ── */
        ::selection {
            background: rgba(209,177,124,0.25);
            color: #fff;
        }
    </style>
</head>
